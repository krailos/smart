<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8" />
<title>teachers</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
	rel="stylesheet"
	integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
	crossorigin="anonymous" />
<script
	src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
	integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
	crossorigin="anonymous"></script>
</head>
<body>
	<nav class="navbar navbar-expand-lg" style="background-color: #edeff1"
		data-bs-theme="light">
		<div class="container">
			<a class="navbar-brand" href="/">Smartum</a>
			<button class="navbar-toggler" type="button"
				data-bs-toggle="collapse" data-bs-target="#navbarNav"
				aria-controls="navbarNav" aria-expanded="false"
				aria-label="Toggle navigation">
				<span class="navbar-toggler-icon"></span>
			</button>
			<div class="collapse navbar-collapse" id="navbarNav">
				<ul class="navbar-nav">
					<li class="nav-item"><a th:href="@{/teachers/teacher/new}">
							<button class="btn btn-success">Додати вчителя</button>
					</a></li>
					
				</ul>
			</div>
		</div>
	</nav>
	<div class="container my-4">
		<div class="text-center text-uppercase fs-5 fw-bolder">ВЧИТЕЛІ</div>
		<div class="row">
			<table class="table table-striped">
				<thead>
					<tr>
						<th scope="col">#</th>
						<th scope="col">Прізвище</th>
						<th scope="col">Імя</th>
						<th scope="col">По батькові</th>
						<th scope="col">Телефон</th>
						<th scope="col">К-сть груп</th>
						<th scope="col">Групи</th>
						<th scope="col">Редагувати</th>
						<th scope="col">Видалити</th>
					</tr>
				</thead>
				<tbody>
					<tr th:each="teacher, index : ${teachers}">
						<td th:text="${index.count}"></td>
						<td th:text="${teacher.lastName}"></td>
						<td th:text="${teacher.firstName}"></td>
						<td th:text="${teacher.secondName}"></td>
						<td th:text="${teacher.phone}"></td>
						<td th:text="${teacher.getGangs().size()}"></td>

						<td><a th:href="@{/}">
                                <button class="btn btn-primary">Групи</button>
                        </a></td>
                            <td><a th:href="@{/teachers/{id} (id=${teacher.id}) }">
                                <button class="btn btn-primary">Редагувати</button>
                        </a></td>    
						<td>
							<form th:action="@{/teachers/{id}/delete( id=${teacher.id})}"
								method="post">
								<button class="btn btn-danger">Видалити</button>
							</form> 
						</td>
					</tr>
				</tbody>
			</table>
		</div>
	</div>
</body>
</html>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8" />
<title>account</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
	rel="stylesheet"
	integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
	crossorigin="anonymous" />
<script
	src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
	integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
	crossorigin="anonymous"></script>
</head>
<body>
	<nav class="navbar navbar-expand-lg" style="background-color: #edeff1"
		data-bs-theme="light">
		<div class="container">
			<a class="navbar-brand" href="/">Smartum</a>
			<button class="navbar-toggler" type="button"
				data-bs-toggle="collapse" data-bs-target="#navbarNav"
				aria-controls="navbarNav" aria-expanded="false"
				aria-label="Toggle navigation">
				<span class="navbar-toggler-icon"></span>
			</button>
			<div class="collapse navbar-collapse" id="navbarNav">
				<ul class="navbar-nav">
					<li class="nav-item"><a class="nav-link active"
						aria-current="page" href="/reports">Звіти</a></li>
				</ul>
			</div>
		</div>
	</nav>
	<div class="container">
		<div>
			<div class="text-center fs-6 text-uppercase fw-semibold">Звіт по нарахуванням та платежам</div>
			<div  class="col-md-6"> 
			
				<table class="table table-light">
	                    <thead>
	                        <tr>
	                           <th scope="col">Студент</th>   
	                           <th scope="col">Період</th>   
	                        </tr>
	                    </thead>
	                    <tbody >
	                        <tr>                        
	                            <td th:text="|${bill.student.lastName} ${bill.student.firstName} (${bill.student.contactName} - ${bill.student.phone})|"></td>
	                            <td th:text="|з ${bill.startDate} по ${bill.endDate}|"></td>
	                                       
	                        </tr>
	                    </tbody>
	            </table>
			</div>
			
			    <table class="table table-light">
	                <thead>
	                    <tr>
	                        <th scope="col">#</th>
	                        <th scope="col">Дата</th>
	                        <th scope="col">Курс</th>                
	                        <th scope="col">Група</th>               
	                        <th scope="col">Присутній</th>                                               
	                        <th scope="col">Платний</th>                                               
	                        <th scope="col">Ціна</th>                                               
	                        <th scope="col">Вид знижки</th>                                               
	                        <th scope="col">Знижка</th>                                               
	                        <th scope="col">Вартість</th>                  
	                    </tr>
	                </thead>
	                <tbody class="table-group-divider">
	                    <tr th:each="item, index : ${items}">
	                        <td th:text="${index.count}"></td>
	                        <td th:text="${item.date}"></td>
	                        <td th:text="${item.subject.name}"></td>
	                        <td th:text="${item.gang.name}"></td>
	                        <td th:if="${item.lessonStudent.present}">Так</td>    
	                        <td th:unless="${item.lessonStudent.present}">Ні</td>    
	                        <td th:if="${item.lessonStudent.payed}">Так</td>    
	                        <td th:unless="${item.lessonStudent.payed}">Ні</td>    
	                        <td th:text="${item.price.value}"></td>    
	                        <td th:text="${item.discount.name}"></td>    
	                        <td th:text="${item.discount.value}"></td>    
	                        <td th:text="${item.itemSum}"></td>   
	                    </tr>
	                    <tr class="fw-bold">	                   
	                       <td></td>	                   
	                       <td>Всього </td>	
	                       <td></td> 
	                       <td></td>  
	                       <td></td> 
	                       <td></td>    
	                       <td></td>   
	                       <td></td>  
	                       <td></td>              
                           <td th:text="${bill.totalItemSum}"></td>             
	                    </tr>
	                </tbody>
            </table>
            
              <table class="table table-light">
                    <thead>
                        <tr>
                            <th scope="col">#</th>
                            <th scope="col">Дата</th>
                            <th scope="col">Платіж</th>                
                            <th scope="col">Опис</th>               
                            <th scope="col">Сума</th>                                                                                       
                        </tr>
                    </thead>
                    <tbody class="table-group-divider">
                        <tr th:each="payment, index : ${payments}">
                            <td th:text="${index.count}"></td>
                            <td th:text="${payment.date}"></td>
                            <td th:text="|${payment.student.lastName} ${payment.student.firstName}| "> </td>
                            <td th:text="${payment.description}"></td>
                            <td th:text="${payment.value}"></td>
                            
                        </tr>
                        <tr class="fw-bold">                       
                           <td></td>                       
                           <td>Всього платежі </td>  
                           <td></td>           
                           <td></td>           
                           <td th:text="${bill.totalPaymentSum}"></td>             
                        </tr>
                         <tr class="fw-bold">                       
                           <td></td>                       
                           <td>Баланс </td>  
                           <td></td>           
                           <td></td>           
                           <td th:text="${bill.balance}"></td>             
                        </tr>
                    </tbody>
            </table>
                
                
                  
                
		</div>
	</div>
</body>
</html>
